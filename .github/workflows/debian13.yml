name: Build debian13

on:
  push:
    paths:
      - 'debian13/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USER_NAME }}/debian13

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: CheckoutCode
        uses: actions/checkout@v4

      - name: LoginToDockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKENS }}

      - name: SetupDockerBuildx
        uses: docker/setup-buildx-action@v3

      - name: BuildAndPushDockerImage
        uses: docker/build-push-action@v6
        with:
          context: ./debian13 # 构建上下文，即 Dockerfile 所在的目录
          push: true          # 构建完成后推送到仓库
          tags: |
            ${{ env.IMAGE_NAME }}:1.6.1
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
