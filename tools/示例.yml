name: Build php82-fpm

# 触发条件: 当代码推送到 main 分支，或是推送了一个以 'v' 开头的标签（如 v1.0.0）时运行
on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
    paths:
      - 'api/**'

env:
  # 定义镜像名称，格式为 Docker用户名/仓库名
  IMAGE_NAME: ${{ secrets.DOCKER_USER_NAME }}/php82-fpm

# 工作流
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录到 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKENS }}

      # 3. 设置 Docker Buildx (支持多平台构建等高级功能)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src # 构建上下文，即 Dockerfile 所在的目录
          push: true     # 构建完成后推送到仓库
          # 为镜像设置多个标签
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
